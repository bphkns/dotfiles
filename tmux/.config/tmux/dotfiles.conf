# Dotfiles behavior overrides. Omarchy owns the main tmux config and theme.
set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -g terminal-overrides 'linux*:AX@,xterm*:Tc,*256col*:RGB,*:Smulx=\E[4::%p1%dm,*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard external
set -g escape-time 0
set -g allow-passthrough on

set -g prefix C-a
set -gu prefix2
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind Space

unbind c
bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Config reloaded"

# Smart pane switching with awareness of Vim splits.
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

bind m resize-pane -Z
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

bind-key -n -N "Edit scrollback in nvim (new window)" 'M-w' new-window \
    "tmux capture-pane -t {last} -S - -p | nvim -"
bind-key -n -N "Save scrollback to file and edit (split)" M-| split-window -h \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"
bind-key -n -N "Save scrollback to file and edit (window)" M-W new-window \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"

set -g mouse on
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1

set -g extended-keys on
set -g extended-keys-format csi-u

# Pane borders: muted inactive splits, clear active split, useful pane labels.
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#76946A"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " #{?pane_active,#[fg=#76946A,bold]▶, } #{pane_index} │ #{pane_current_command} "
set -g pane-border-indicators off

# Status CPU/RAM from local tmux-mem-cpu-load-compatible script.
set -g status-interval 2
set -g status-right-length 60
set -g status-right "#{?client_prefix,#[fg=#E6C384,bold]●  ,}#[fg=#727169]#($HOME/.config/tmux/plugins/tmux-mem-cpu-load/tmux-mem-cpu-load --graph-lines 0 --interval 2) "

# Plugins (TPM). Install: prefix + I  |  Update: prefix + U  |  Remove: prefix + alt+u
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'

set -g @plugin 'tmux-plugins/tpm'

# URL picker over visible scrollback (prefix + u)
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @fzf-url-bind 'u'
set -g @fzf-url-history-limit '2000'
set -g @fzf-url-fzf-options '-w 60% -h 40% --multi --prompt="URL> "'

# fzf-driven menus for windows/sessions/commands (prefix + F)
set -g @plugin 'sainnhe/tmux-fzf'
TMUX_FZF_LAUNCH_KEY="F"

# Floating scratch pane (prefix + p toggles)
set -g @plugin 'omerxx/tmux-floax'
set -g @floax-bind 'p'
set -g @floax-width '80%'
set -g @floax-height '80%'
set -g @floax-border-color '#76946A'
set -g @floax-text-color 'default'
set -g @floax-change-path 'true'

# Session persistence
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @resurrect-capture-pane-contents 'on'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'

run '~/.config/tmux/plugins/tpm/tpm'
