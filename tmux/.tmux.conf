set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -q -g status-utf8 on
set -q -g utf8 on
set-option -sa terminal-overrides ",xterm*:Tc"
set -ag terminal-overrides ",xterm-256color:RGB"
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'  # undercurl support
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'  # underscore colours
set -sg escape-time 0
set -g history-limit 50000

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind c
bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Note: C-\ keybinding disabled - use 'prefix + l' for last pane
# bind-key -n 'C-\\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
# bind-key -T copy-mode-vi 'C-\\' select-pane -l
bind -r m resize-pane -Z
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# bind-key -n -N "Edit scrollback in nvim (split)" 'M-\\' split-window -h \
#     "tmux capture-pane -t {last} -S - -p | nvim -"

bind-key -n -N "Edit scrollback in nvim (new window)" 'M-w' new-window \
    "tmux capture-pane -t {last} -S - -p | nvim -"

bind-key -n -N "Save scrollback to file and edit (split)" M-| split-window -h \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"
bind-key -n -N "Save scrollback to file and edit (window)" M-W new-window \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

unbind -T copy-mode-vi MouseDragEnd1Pane

#Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'omerxx/tmux-floax'

# Everforest theme - using tmux-dotbar instead
# set -g @plugin 'TanglingTreats/tmux-everforest'
# set -g @everforest_theme 'dark-soft'

# tmux-dotbar with everforest colors
set -g @plugin 'vaaleyard/tmux-dotbar'
set -g @tmux-dotbar-position "top"
set -g @tmux-dotbar-bg "#2D353B"
set -g @tmux-dotbar-fg "#7A8478"
set -g @tmux-dotbar-fg-current "#A7C080"
set -g @tmux-dotbar-fg-session "#D3C6AA"
set -g @tmux-dotbar-fg-prefix "#DBBC7F"

# Pane borders with everforest colors
set -g pane-border-style "fg=#7A8478"
set -g pane-active-border-style "fg=#A7C080"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " ▶ #{pane_index} │ #{pane_current_command} "



# Recommended settings for tmux-dotbar
set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

set -g @plugin 'tmux-resurrect'
set -g @plugin 'tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

# Status bar styling - everforest dark soft (blended)
set -g status-position top
set -g status-justify left
set -g status-style "bg=#2D353B,fg=#D3C6AA"

# Left status - session blends into status bar
set -g status-left "#[fg=#83C092,bg=#2D353B]  #[fg=#A7C080,bg=#2D353B,bold] #S #[fg=#4F5B58,bg=#2D353B]▕"
set -g status-left-length 40

# Window styling - soft transitions
set -g window-status-format "#[fg=#7A8478,bg=#2D353B] #I #[fg=#374145,bg=#2D353B]▕#[fg=#9DA9A0,bg=#2D353B] #W "
set -g window-status-current-format "#[fg=#2D353B,bg=#83C092,bold] #I #[fg=#2D353B,bg=#83C092,bold]▕#[fg=#2D353B,bg=#83C092,bold] #W #[fg=#83C092,bg=#2D353B]▕"

# Right status - blends back to background
set -g status-right "#[fg=#4F5B58,bg=#2D353B]▕#[fg=#7FBBB3,bg=#2D353B]  %H:%M #[fg=#4F5B58,bg=#2D353B]▕#[fg=#D699B6,bg=#2D353B]  %d-%b #[fg=#4F5B58,bg=#2D353B]▕#[fg=#A7C080,bg=#2D353B]  #{host_short} "
set -g status-right-length 50
