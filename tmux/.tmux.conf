set -g default-shell /usr/bin/zsh
set -g default-terminal "tmux-256color"
set -g terminal-overrides 'linux*:AX@,xterm*:Tc,*256col*:RGB,*:Smulx=\E[4::%p1%dm,*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -g history-limit 50000
set -g focus-events on
set -g detach-on-destroy off
set -g set-clipboard external

set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

# Disable default rotate layout
unbind Space

unbind c
bind c new-window -c "#{pane_current_path}"

unbind r
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator

# decide whether we're in a Vim process
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Note: C-\ keybinding disabled - use 'prefix + l' for last pane
# bind-key -n 'C-\\' if-shell "$is_vim" 'send-keys C-\\' 'select-pane -l'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
# bind-key -T copy-mode-vi 'C-\\' select-pane -l
bind m resize-pane -Z
bind -n C-M-h resize-pane -L 5
bind -n C-M-j resize-pane -D 5
bind -n C-M-k resize-pane -U 5
bind -n C-M-l resize-pane -R 5

# bind-key -n -N "Edit scrollback in nvim (split)" 'M-\\' split-window -h \
#     "tmux capture-pane -t {last} -S - -p | nvim -"

bind-key -n -N "Edit scrollback in nvim (new window)" 'M-w' new-window \
    "tmux capture-pane -t {last} -S - -p | nvim -"

bind-key -n -N "Save scrollback to file and edit (split)" M-| split-window -h \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"
bind-key -n -N "Save scrollback to file and edit (window)" M-W new-window \
    "f=/tmp/tmux-scrollback-\$\$.txt; tmux capture-pane -t {last} -S - -p > \$f; nvim \$f; rm -f \$f"

set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection
bind-key -T copy-mode-vi 'y' send -X copy-selection

#Plugins
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'nhdaly/tmux-better-mouse-mode'
set -g @emulate-scroll-for-no-mouse-alternate-buffer 'on'
set -g @plugin 'wfxr/tmux-fzf-url'
set -g @plugin 'sainnhe/tmux-fzf'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_with_mouse off
set -g @plugin 'omerxx/tmux-floax'
set -g @plugin 'thewtex/tmux-mem-cpu-load'

# Pane borders with kanagawa-wave colors
set -g pane-border-style "fg=#363646"
set -g pane-active-border-style "fg=#76946A"
set -g pane-border-lines heavy
set -g pane-border-status top
set -g pane-border-format " ▶ #{pane_index} │ #{pane_current_command} "
set -g pane-border-indicators off

# Background-only tint for inactive non-Neovim panes.
set -g window-active-style "bg=#1F1F28"
set -g window-style "bg=#181820"

set-option -g renumber-windows on
set -g base-index 1
setw -g pane-base-index 1
set -g allow-passthrough on

set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

set -g @plugin 'tmux-plugins/tpm'
run '~/.tmux/plugins/tpm/tpm'

# === Status bar — kanagawa, inverted chip on active ===
set -g status-position top
set -g status-justify left
set -g status-style "bg=#1F1F28,fg=#727169"
set -g status-interval 2

# Left: session in autumn green (single primary accent on left)
set -g status-left "#[fg=#76946A,bold] #S  "
set -g status-left-length 30

# Inactive: muted index, soft name, curated flags only
set -g window-status-format " #[fg=#54546D]#I #[fg=#727169]#W#{?window_bell_flag,#[fg=#E82424] !,}#{?window_activity_flag,#[fg=#76946A] •,}#{?#{>:#{window_panes},1},#[fg=#54546D] #{window_panes},} "

# Active: high-contrast inverted chip with soft half-block edges
set -g window-status-current-format "#[fg=#DCD7BA,bg=#1F1F28]▐#[fg=#16161D,bg=#DCD7BA,bold] #I #W#{?window_zoomed_flag, Z,}#{?#{>:#{window_panes},1},  #{window_panes},} #[fg=#DCD7BA,bg=#1F1F28]▌"

# Whitespace > separators (chip edges already give visual breathing room)
set -g window-status-separator " "

# Right: prefix dot (when active) + mem · cpu · load
set -g status-right "#{?client_prefix,#[fg=#E6C384,bold]●  ,}#[fg=#727169]#($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load --graph-lines 0 --interval 2) "
set -g status-right-length 60

set -g extended-keys on
set -g extended-keys-format csi-u
