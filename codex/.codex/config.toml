model = "gpt-5.4"
model_reasoning_effort = "xhigh"
personality = "pragmatic"
service_tier = "fast"
project_doc_max_bytes = 65536

[features]
apps = true
codex_hooks = true
multi_agent = true
personality = true
shell_snapshot = true
steer = true
unified_exec = true
use_linux_sandbox_bwrap = true

[agents]
max_threads = 6
max_depth = 1

[projects."/home/bikash"]
trust_level = "trusted"

[projects."/home/bikash/code"]
trust_level = "trusted"

[projects."/home/bikash/code/durable-effect"]
trust_level = "trusted"

[projects."/home/bikash/code/leapy"]
trust_level = "trusted"

[projects."/home/bikash/dotfiles"]
trust_level = "trusted"

[projects."/home/bikash/work/leapspace-waitlist"]
trust_level = "trusted"

[projects."/home/bikash/work/trueleap-inc"]
trust_level = "trusted"

[projects."/home/bikash/work/trueleap-plus"]
trust_level = "trusted"

[projects."/home/bikash/work/v2"]
trust_level = "trusted"

[projects."/home/bikash/work/workspace-agent"]
trust_level = "trusted"

[projects."/home/bikash/learning/comms-app"]
trust_level = "trusted"

[mcp_servers.uidotsh]
url = "https://ui.sh/mcp?agent=codex"
bearer_token_env_var = "UIDOTSH_TOKEN"

[mcp_servers.uidotsh.tools.uidotsh_fetch]
approval_mode = "approve"

[mcp_servers.context7]
url = "https://mcp.context7.com/mcp"
enabled = true

[mcp_servers.context7.env_http_headers]
"CONTEXT7_API_KEY" = "CONTEXT7_API_KEY"

[mcp_servers.gh_grep]
url = "https://mcp.grep.app"
enabled = true

[mcp_servers.exa]
url = "https://mcp.exa.ai/mcp"
enabled = true

[mcp_servers.exa.env_http_headers]
"x-api-key" = "EXA_API_KEY"

[notice.model_migrations]
"gpt-5.3-codex" = "gpt-5.4"

[tui.model_availability_nux]
"gpt-5.5" = 1
