# Dotfiles behavior overrides. Omarchy owns the dynamic theme import.
font-family = "IosevkaTerm Nerd Font Mono"
font-size = 12
window-decoration = false

mouse-hide-while-typing = true
keybind = alt+backspace=text:\x1b\x7f

# Splits
keybind = ctrl+shift+backslash=new_split:right
keybind = ctrl+shift+minus=new_split:down
keybind = ctrl+shift+t=new_tab
keybind = ctrl+shift+x=close_surface
keybind = performable:ctrl+shift+h=goto_split:left
keybind = performable:ctrl+shift+j=goto_split:down
keybind = performable:ctrl+shift+k=goto_split:up
keybind = performable:ctrl+shift+l=goto_split:right
keybind = ctrl+shift+m=toggle_split_zoom

# Resize and navigation
keybind = ctrl+alt+h=resize_split:left,20
keybind = ctrl+alt+l=resize_split:right,20
keybind = ctrl+alt+k=resize_split:up,10
keybind = ctrl+alt+j=resize_split:down,10
keybind = ctrl+shift+n=next_tab
keybind = ctrl+shift+p=previous_tab
keybind = ctrl+shift+e=equalize_splits

# Scrollback
keybind = ctrl+shift+alt+backslash=write_screen_file:open
